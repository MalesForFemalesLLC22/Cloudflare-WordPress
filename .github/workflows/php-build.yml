name: Test Build Artifact

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    name: Build artifact
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Build plugin
      uses: ./.github/actions/build-plugin

    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      with:
        name: build-artifact
        path: build/
        retention-days: 1

    - name: Install dev dependencies
      run: composer install --prefer-dist --no-progress

    - name: Upload dev vendor
      uses: actions/upload-artifact@v4
      with:
        name: vendor-dev
        path: vendor/
        retention-days: 1

  syntax-check:
    name: Syntax Check (build artifact)
    needs: build
    runs-on: ubuntu-latest

    steps:
    - uses: shivammathur/setup-php@v2
      with:
        php-version: '7.4'

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact
        path: build/

    - name: PHP syntax check
      run: for f in $(find build/ -name '*.php'); do php -l $f; RETVAL=$?; if [ $RETVAL -ne 0 ]; then exit $RETVAL; fi; done

  test-build:
    name: Test build (PHP ${{ matrix.php-versions }})
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php-versions: ['7.4', '8.0', '8.1', '8.2', '8.3', '8.4']

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - uses: shivammathur/setup-php@v2
      with:
        php-version: ${{ matrix.php-versions }}

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: build-artifact
        path: build/

    - name: Download dev vendor
      uses: actions/download-artifact@v4
      with:
        name: vendor-dev
        path: vendor/

    - name: Run tests against build artifact
      run: composer run-script test-build
